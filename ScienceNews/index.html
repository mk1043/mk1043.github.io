<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ScienceNews</title>
    <style>
      :root {
        color-scheme: light;
        --border: #d8dee8;
        --ink: #18202a;
        --muted: #5b6778;
        --panel: #f7f9fc;
        --accent: #0f6e6e;
        --accent-soft: #e5f4f2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
        line-height: 1.65;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(220px, 25%) 1fr;
        min-height: 100vh;
      }

      .sidebar {
        border-right: 1px solid var(--border);
        background: var(--panel);
        padding: 24px 18px;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow: auto;
      }

      .brand {
        display: block;
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        font-size: 1.25rem;
        font-weight: 700;
        text-align: left;
        padding: 0 0 18px;
      }

      .nav-title {
        color: var(--muted);
        font-size: 0.85rem;
        font-weight: 700;
        margin: 18px 8px 8px;
      }

      .nav-button,
      .article-button {
        display: block;
        width: 100%;
        border: 1px solid transparent;
        background: transparent;
        border-radius: 6px;
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        text-align: left;
      }

      .nav-button {
        padding: 10px 12px;
        font-weight: 600;
      }

      .article-button {
        padding: 8px 12px 8px 22px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .nav-button:hover,
      .article-button:hover,
      .active {
        border-color: #b7d8d2;
        background: var(--accent-soft);
        color: var(--accent);
      }

      .content {
        padding: 32px clamp(20px, 5vw, 72px);
        max-width: 1080px;
      }

      .status {
        color: var(--muted);
      }

      h1,
      h2,
      h3 {
        line-height: 1.25;
      }

      h1 {
        font-size: clamp(2rem, 4vw, 3rem);
        margin: 0 0 20px;
      }

      h2 {
        border-bottom: 1px solid var(--border);
        margin-top: 34px;
        padding-bottom: 6px;
      }

      a {
        color: var(--accent);
      }

      ul {
        padding-left: 1.3rem;
      }

      .article-list {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }

      .article-list button {
        border: 1px solid var(--border);
        background: #ffffff;
        border-radius: 6px;
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        padding: 14px 16px;
        text-align: left;
      }

      .article-list button:hover {
        border-color: #8dbfb6;
      }

      @media (max-width: 760px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
          height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <button class="brand" type="button" data-home>ScienceNews</button>
        <div class="nav-title">類別</div>
        <nav id="category-nav" aria-label="Science categories"></nav>
        <div class="nav-title">日期文章</div>
        <nav id="article-nav" aria-label="Category article dates"></nav>
      </aside>
      <main class="content" id="content">
        <p class="status">載入中...</p>
      </main>
    </div>

    <script>
      const content = document.querySelector("#content");
      const categoryNav = document.querySelector("#category-nav");
      const articleNav = document.querySelector("#article-nav");
      let manifest = null;

      document.querySelector("[data-home]").addEventListener("click", () => {
        clearActive();
        articleNav.innerHTML = "";
        loadMarkdown("index.md");
      });

      init();

      async function init() {
        try {
          manifest = await fetchJson("manifest.json");
          renderCategories();
          await loadMarkdown(manifest.home || "index.md");
        } catch (error) {
          content.innerHTML = `<p class="status">無法載入入口資料：${escapeHtml(error.message)}</p>`;
        }
      }

      async function fetchJson(path) {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`${path} (${response.status})`);
        }
        return response.json();
      }

      async function loadMarkdown(path) {
        content.innerHTML = '<p class="status">載入中...</p>';
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) {
          content.innerHTML = `<p class="status">找不到文章：${escapeHtml(path)}</p>`;
          return;
        }
        const markdown = await response.text();
        content.innerHTML = renderMarkdown(markdown);
      }

      function renderCategories() {
        categoryNav.innerHTML = "";
        manifest.categories.forEach((category) => {
          const button = document.createElement("button");
          button.className = "nav-button";
          button.type = "button";
          button.textContent = category.label;
          button.addEventListener("click", () => showCategory(category, button));
          categoryNav.appendChild(button);
        });
      }

      function showCategory(category, button) {
        clearActive();
        button.classList.add("active");
        articleNav.innerHTML = "";

        if (!category.articles.length) {
          content.innerHTML = `<h1>${escapeHtml(category.label)}</h1><p class="status">目前沒有文章。</p>`;
          return;
        }

        category.articles.forEach((article) => {
          const articleButton = document.createElement("button");
          articleButton.className = "article-button";
          articleButton.type = "button";
          articleButton.textContent = article.title;
          articleButton.addEventListener("click", () => {
            document.querySelectorAll(".article-button").forEach((item) => item.classList.remove("active"));
            articleButton.classList.add("active");
            loadMarkdown(article.path);
          });
          articleNav.appendChild(articleButton);
        });

        content.innerHTML = `
          <h1>${escapeHtml(category.label)}</h1>
          <p class="status">請選擇日期閱讀文章。</p>
          <div class="article-list">
            ${category.articles.map((article) => `
              <button type="button" data-path="${escapeHtml(article.path)}">${escapeHtml(article.title)}</button>
            `).join("")}
          </div>
        `;
        content.querySelectorAll("[data-path]").forEach((item) => {
          item.addEventListener("click", () => loadMarkdown(item.dataset.path));
        });
      }

      function clearActive() {
        document.querySelectorAll(".active").forEach((item) => item.classList.remove("active"));
      }

      function renderMarkdown(markdown) {
        const blocks = [];
        let listItems = [];

        markdown.split(/\r?\n/).forEach((line) => {
          if (line.startsWith("- ")) {
            listItems.push(`<li>${inlineMarkdown(line.slice(2))}</li>`);
            return;
          }
          flushList();
          if (line.startsWith("### ")) {
            blocks.push(`<h3>${inlineMarkdown(line.slice(4))}</h3>`);
          } else if (line.startsWith("## ")) {
            blocks.push(`<h2>${inlineMarkdown(line.slice(3))}</h2>`);
          } else if (line.startsWith("# ")) {
            blocks.push(`<h1>${inlineMarkdown(line.slice(2))}</h1>`);
          } else if (line.trim()) {
            blocks.push(`<p>${inlineMarkdown(line)}</p>`);
          }
        });
        flushList();
        return blocks.join("\n");

        function flushList() {
          if (listItems.length) {
            blocks.push(`<ul>${listItems.join("")}</ul>`);
            listItems = [];
          }
        }
      }

      function inlineMarkdown(text) {
        return escapeHtml(text).replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_match, label, url) => {
          const safeUrl = String(url).replace(/"/g, "&quot;");
          return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${label}</a>`;
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    </script>
  </body>
</html>
